<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f5;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a1a2e;
    color: #fff;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status {
    margin-left: auto;
    font-size: 12px;
    padding: 4px 10px;
    border-radius: 12px;
    background: #16a34a;
  }
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .sidebar {
    width: 220px;
    background: #fff;
    border-right: 1px solid #e5e5e5;
    display: flex;
    flex-direction: column;
    padding: 16px;
  }
  .sidebar button {
    width: 100%;
    padding: 10px;
    border: 1px solid #e5e5e5;
    border-radius: 8px;
    background: #fff;
    cursor: pointer;
    font-size: 14px;
    margin-bottom: 12px;
    transition: all 0.2s;
  }
  .sidebar button:hover { background: #f5f5f5; border-color: #ccc; }
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #fff;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    max-width: 80%;
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user {
    align-self: flex-end;
    background: #1a1a2e;
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #f0f0f0;
    color: #333;
    border-bottom-left-radius: 4px;
  }
  .input-area {
    padding: 16px 20%;
    border-top: 1px solid #e5e5e5;
    background: #fff;
  }
  .input-box {
    display: flex;
    gap: 8px;
    border: 1px solid #e5e5e5;
    border-radius: 12px;
    padding: 8px 12px;
    align-items: flex-end;
  }
  .input-box textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-size: 14px;
    line-height: 1.5;
    max-height: 120px;
    font-family: inherit;
  }
  .input-box button {
    padding: 8px 16px;
    border: none;
    border-radius: 8px;
    background: #1a1a2e;
    color: #fff;
    cursor: pointer;
    font-size: 14px;
  }
  .input-box button:disabled { opacity: 0.5; cursor: not-allowed; }
  .empty-state {
    text-align: center;
    color: #999;
    margin-top: 40px;
  }
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .messages, .input-area { padding: 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>IronClaw</h1>
  <span class="status" id="status">在线</span>
</header>
<main>
  <aside class="sidebar">
    <button onclick="newChat()">+ 新对话</button>
    <div style="font-size:12px;color:#999;margin-top:auto">
      直接输入消息开始对话<br>
      支持工具调用与安全扫描
    </div>
  </aside>
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state">开始你的第一次对话</div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="send()">发送</button>
      </div>
    </div>
  </div>
</main>
<script>
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const userID = 'web-' + Math.random().toString(36).slice(2, 8);

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function newChat() {
  msgsEl.innerHTML = '<div class="empty-state">开始你的第一次对话</div>';
}

function appendMsg(role, text) {
  const empty = msgsEl.querySelector('.empty-state');
  if (empty) empty.remove();
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

async function send() {
  const text = inputEl.value.trim();
  if (!text) return;
  appendMsg('user', text);
  inputEl.value = '';
  inputEl.rows = 1;
  sendBtn.disabled = true;
  sendBtn.textContent = '...';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: userID, content: text })
    });
    const data = await res.json();
    appendMsg('assistant', data.content || '无响应');
  } catch (err) {
    appendMsg('assistant', '请求失败: ' + err.message);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = '发送';
  }
}

// auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.rows = 1;
  const lines = inputEl.value.split('\n').length;
  inputEl.rows = Math.min(lines, 6);
});
</script>
</body>
</html>
