<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IronClaw</title>
<style>
  :root {
    --color-bg: #f8fafc;
    --color-surface: #ffffff;
    --color-primary: #0f172a;
    --color-primary-hover: #1e293b;
    --color-text: #0f172a;
    --color-text-secondary: #64748b;
    --color-text-muted: #94a3b8;
    --color-border: #e2e8f0;
    --color-border-hover: #cbd5e1;
    --color-assistant-bg: #f1f5f9;
    --color-success: #10b981;
    --color-success-hover: #059669;
    --color-danger: #ef4444;
    --color-danger-hover: #dc2626;
    --radius-sm: 6px;
    --radius-md: 8px;
    --radius-lg: 12px;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
    --transition-fast: 0.15s ease;
    --transition-base: 0.2s ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--color-bg);
    color: var(--color-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    -webkit-font-smoothing: antialiased;
  }

  header {
    background: var(--color-surface);
    border-bottom: 1px solid var(--color-border);
    padding: 0 24px;
    height: 52px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--color-primary);
  }

  header .status {
    margin-left: auto;
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(16, 185, 129, 0.1);
    color: var(--color-success);
    border: 1px solid rgba(16, 185, 129, 0.2);
  }

  header .status.offline {
    background: rgba(239, 68, 68, 0.08);
    color: var(--color-danger);
    border-color: rgba(239, 68, 68, 0.15);
  }

  header .sse-status {
    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(100, 116, 139, 0.08);
    color: var(--color-text-secondary);
    border: 1px solid rgba(100, 116, 139, 0.15);
  }

  header .sse-status.connected {
    background: rgba(16, 185, 129, 0.1);
    color: var(--color-success);
    border-color: rgba(16, 185, 129, 0.2);
  }

  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .sidebar {
    width: 280px;
    background: var(--color-surface);
    border-right: 1px solid var(--color-border);
    display: flex;
    flex-direction: column;
    padding: 16px;
    gap: 16px;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .sidebar-section {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .sidebar-section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .sidebar h3 {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--color-text-secondary);
  }

  .sidebar button {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--color-text);
    transition: all var(--transition-fast);
    text-align: left;
  }

  .sidebar button:hover {
    border-color: var(--color-border-hover);
    background: #f8fafc;
  }

  .sidebar button:active {
    transform: scale(0.995);
  }

  .sidebar button.primary {
    background: var(--color-primary);
    color: #fff;
    border-color: var(--color-primary);
  }

  .sidebar button.primary:hover {
    background: var(--color-primary-hover);
    border-color: var(--color-primary-hover);
  }

  .sidebar button.icon-btn {
    width: auto;
    padding: 6px 10px;
    font-size: 12px;
    border-radius: var(--radius-sm);
  }

  .gate-item {
    font-size: 12px;
    padding: 12px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    background: var(--color-surface);
    transition: box-shadow var(--transition-fast);
  }

  .gate-item:hover {
    box-shadow: var(--shadow-sm);
  }

  .gate-item .tool {
    font-weight: 600;
    color: var(--color-text);
    font-size: 13px;
  }

  .gate-item .description {
    color: var(--color-text-secondary);
    margin-top: 4px;
    line-height: 1.4;
  }

  .gate-item .actions {
    margin-top: 10px;
    display: flex;
    gap: 8px;
  }

  .gate-item .actions button {
    flex: 1;
    padding: 6px 0;
    font-size: 12px;
    font-weight: 500;
    border-radius: var(--radius-sm);
    border: 1px solid;
    cursor: pointer;
    transition: all var(--transition-fast);
    text-align: center;
  }

  .gate-item .actions button.approve {
    background: var(--color-success);
    color: #fff;
    border-color: var(--color-success);
  }

  .gate-item .actions button.approve:hover {
    background: var(--color-success-hover);
    border-color: var(--color-success-hover);
  }

  .gate-item .actions button.deny {
    background: var(--color-surface);
    color: var(--color-danger);
    border-color: var(--color-danger);
  }

  .gate-item .actions button.deny:hover {
    background: var(--color-danger);
    color: #fff;
  }

  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--color-surface);
    min-width: 0;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 18%;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .msg {
    max-width: 82%;
    padding: 14px 18px;
    border-radius: var(--radius-lg);
    font-size: 14px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    animation: msgIn 0.25s ease-out;
    position: relative;
  }

  @keyframes msgIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: var(--color-primary);
    color: #fff;
    border-bottom-right-radius: 4px;
    box-shadow: var(--shadow-sm);
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--color-assistant-bg);
    color: var(--color-text);
    border-bottom-left-radius: 4px;
  }

  .msg.error {
    align-self: flex-start;
    background: rgba(239, 68, 68, 0.06);
    color: var(--color-danger);
    border: 1px solid rgba(239, 68, 68, 0.15);
    border-bottom-left-radius: 4px;
  }

  .msg .attachment-label {
    font-size: 11px;
    opacity: 0.75;
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(128,128,128,0.2);
    padding-bottom: 4px;
    font-weight: 500;
  }

  .input-area {
    padding: 16px 18%;
    border-top: 1px solid var(--color-border);
    background: var(--color-surface);
    flex-shrink: 0;
  }

  .input-box {
    display: flex;
    gap: 10px;
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: 10px 14px;
    align-items: flex-end;
    background: var(--color-surface);
    transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
  }

  .input-box:focus-within {
    border-color: var(--color-border-hover);
    box-shadow: 0 0 0 3px rgba(15, 23, 42, 0.06);
  }

  .input-box textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-size: 14px;
    line-height: 1.5;
    max-height: 140px;
    font-family: inherit;
    color: var(--color-text);
    background: transparent;
  }

  .input-box textarea::placeholder {
    color: var(--color-text-muted);
  }

  .input-box button {
    padding: 8px 18px;
    border: none;
    border-radius: var(--radius-md);
    background: var(--color-primary);
    color: #fff;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all var(--transition-fast);
    flex-shrink: 0;
  }

  .input-box button:hover:not(:disabled) {
    background: var(--color-primary-hover);
    transform: translateY(-1px);
  }

  .input-box button:active:not(:disabled) {
    transform: translateY(0);
  }

  .input-box button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .file-hint {
    font-size: 11px;
    color: var(--color-text-secondary);
    margin-top: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
    padding-left: 4px;
  }

  .file-hint a {
    color: var(--color-primary);
    cursor: pointer;
    text-decoration: none;
    font-weight: 500;
    transition: opacity var(--transition-fast);
  }

  .file-hint a:hover {
    opacity: 0.7;
    text-decoration: underline;
  }

  .file-hint .file-name {
    color: var(--color-text);
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    color: var(--color-text-muted);
    margin-top: 60px;
    animation: msgIn 0.4s ease-out;
  }

  .empty-state svg {
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-state h3 {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-secondary);
    margin-bottom: 6px;
  }

  .empty-state p {
    font-size: 13px;
    line-height: 1.5;
  }

  .skeleton {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 4px 0;
    animation: msgIn 0.2s ease-out;
  }

  .skeleton-line {
    height: 14px;
    border-radius: 4px;
    background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease infinite;
  }

  .skeleton-line.short { width: 40%; }
  .skeleton-line.medium { width: 70%; }
  .skeleton-line.long { width: 95%; }

  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .thread-list { font-size: 12px; }

  .thread-item {
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-bottom: 2px;
    color: var(--color-text-secondary);
    transition: all var(--transition-fast);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .thread-item:hover {
    background: #f1f5f9;
    color: var(--color-text);
  }

  .thread-item.active {
    background: var(--color-primary);
    color: #fff;
  }

  .tool-progress {
    display: none;
    align-self: flex-start;
    padding: 10px 14px;
    border-radius: var(--radius-md);
    background: #f8fafc;
    border: 1px solid var(--color-border);
    font-size: 12px;
    color: var(--color-text-secondary);
    animation: msgIn 0.2s ease-out;
    max-width: 82%;
  }

  .tool-progress.active {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tool-progress .spinner {
    width: 14px;
    height: 14px;
    border: 2px solid var(--color-border);
    border-top-color: var(--color-primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .tool-progress .tool-name {
    font-weight: 500;
    color: var(--color-text);
  }

  .tool-progress .tool-status {
    color: var(--color-text-muted);
  }

  .hint-text {
    font-size: 11px;
    color: var(--color-text-muted);
    line-height: 1.5;
    margin-top: auto;
    padding-top: 8px;
  }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .messages, .input-area { padding: 16px; }
    .msg { max-width: 92%; }
  }
</style>
</head>
<body>
<header>
  <h1>IronClaw</h1>
  <span class="sse-status" id="sseStatus">SSE 连接中...</span>
  <span class="status" id="status">在线</span>
</header>
<main>
  <aside class="sidebar">
    <div class="sidebar-section">
      <button class="primary" onclick="newChat()">+ 新对话</button>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <h3>历史线程</h3>
        <button class="icon-btn" onclick="loadThreads()">刷新</button>
      </div>
      <div id="threadPanel" class="panel thread-list"></div>
    </div>

    <div class="sidebar-section">
      <div class="sidebar-section-header">
        <h3>待审批门控</h3>
        <button class="icon-btn" onclick="loadGates()">刷新</button>
      </div>
      <div id="gatePanel" class="panel active"></div>
    </div>

    <div class="hint-text">
      直接输入消息开始对话<br>
      支持工具调用与文档提取
    </div>
  </aside>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        <h3>开始你的第一次对话</h3>
        <p>输入消息或附加文件与 IronClaw 交互</p>
      </div>
    </div>
    <div class="input-area">
      <div class="input-box">
        <textarea id="input" rows="1" placeholder="输入消息..." onkeydown="handleKey(event)"></textarea>
        <button id="sendBtn" onclick="send()">发送</button>
      </div>
      <div class="file-hint">
        <a onclick="document.getElementById('fileInput').click()">附加文件</a>
        <span id="fileName" class="file-name"></span>
        <input type="file" id="fileInput" style="display:none" onchange="onFileSelect(event)">
      </div>
    </div>
  </div>
</main>
<script>
const msgsEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');
const sseStatusEl = document.getElementById('sseStatus');
const userID = 'web-' + Math.random().toString(36).slice(2, 8);
let threadID = null;
let selectedFile = null;
let selectedFileData = null;
let activeThreadEl = null;
let eventSource = null;
let resolvingGate = false;

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function newChat() {
  msgsEl.innerHTML = `
    <div class="empty-state">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      <h3>开始你的第一次对话</h3>
      <p>输入消息或附加文件与 IronClaw 交互</p>
    </div>`;
  threadID = null;
  selectedFile = null;
  selectedFileData = null;
  document.getElementById('fileName').textContent = '';
  if (activeThreadEl) {
    activeThreadEl.classList.remove('active');
    activeThreadEl = null;
  }
  connectSSE();
}

function appendMsg(role, text, attachmentInfo) {
  const empty = msgsEl.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg ' + role;
  if (attachmentInfo) {
    const label = document.createElement('div');
    label.className = 'attachment-label';
    label.textContent = attachmentInfo;
    div.appendChild(label);
  }
  const content = document.createElement('div');
  content.textContent = text;
  div.appendChild(content);
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function appendPendingGateMsg(gateInfo) {
  const empty = msgsEl.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg assistant';
  div.id = 'pending-gate-msg';
  div.style.background = 'rgba(15, 23, 42, 0.04)';
  div.style.border = '1px dashed var(--color-border-hover)';
  div.innerHTML = '<div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--color-text-secondary);">'
    + '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>'
    + '<span>等待审批：' + (gateInfo ? (gateInfo.tool_name + ' - ' + gateInfo.description) : '工具调用需要审批') + '</span>'
    + '</div>';
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function setInputDisabled(disabled) {
  inputEl.disabled = disabled;
  sendBtn.disabled = disabled;
  if (disabled) {
    inputEl.placeholder = '请在侧边栏审批以继续...';
  } else {
    inputEl.placeholder = '输入消息...';
  }
}

function appendSkeleton() {
  const empty = msgsEl.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = 'msg assistant skeleton';
  div.id = 'skeleton';
  div.innerHTML = `
    <div class="skeleton-line short"></div>
    <div class="skeleton-line long"></div>
    <div class="skeleton-line medium"></div>`;
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeSkeleton() {
  const sk = document.getElementById('skeleton');
  if (sk) sk.remove();
}

function showToolProgress(toolName) {
  removeToolProgress();
  const div = document.createElement('div');
  div.className = 'tool-progress active';
  div.id = 'tool-progress';
  div.innerHTML = '<div class="spinner"></div><span class="tool-name">' + toolName + '</span><span class="tool-status">执行中...</span>';
  msgsEl.appendChild(div);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function hideToolProgress() {
  const tp = document.getElementById('tool-progress');
  if (tp) {
    tp.querySelector('.tool-status').textContent = '完成';
    setTimeout(() => tp.remove(), 1200);
  }
}

function removeToolProgress() {
  const tp = document.getElementById('tool-progress');
  if (tp) tp.remove();
}

function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  const reader = new FileReader();
  reader.onload = (ev) => {
    selectedFileData = ev.target.result.split(',')[1];
    document.getElementById('fileName').textContent = file.name + ' (' + (file.size/1024).toFixed(1) + 'KB)';
  };
  reader.readAsDataURL(file);
}

async function send() {
  const text = inputEl.value.trim();
  if (!text && !selectedFile) return;

  let displayText = text;
  if (selectedFile) displayText += '\n[附件: ' + selectedFile.name + ']';
  appendMsg('user', displayText || '[附件]');
  inputEl.value = '';
  inputEl.rows = 1;
  sendBtn.disabled = true;
  appendSkeleton();

  const payload = { user_id: userID, content: text || '请分析附件' };
  if (threadID) payload.thread_id = threadID;

  if (selectedFile && selectedFileData) {
    payload.attachments = [{
      mime_type: selectedFile.type || 'application/octet-stream',
      filename: selectedFile.name,
      data_base64: selectedFileData
    }];
  }

  try {
    await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    // 响应通过 SSE 推送，不再阻塞等待
  } catch (err) {
    removeSkeleton();
    appendMsg('error', '发送失败: ' + err.message);
    sendBtn.disabled = false;
  } finally {
    selectedFile = null;
    selectedFileData = null;
    document.getElementById('fileName').textContent = '';
    document.getElementById('fileInput').value = '';
  }
}

function connectSSE() {
  if (eventSource) {
    eventSource.close();
  }
  const url = new URL('/api/chat/stream', window.location.href);
  url.searchParams.set('user_id', userID);
  if (threadID) url.searchParams.set('thread_id', threadID);

  eventSource = new EventSource(url.toString());
  sseStatusEl.textContent = 'SSE 连接中...';
  sseStatusEl.classList.remove('connected');

  eventSource.addEventListener('connected', () => {
    sseStatusEl.textContent = 'SSE 已连接';
    sseStatusEl.classList.add('connected');
  });

  eventSource.addEventListener('agent_response', (e) => {
    const data = JSON.parse(e.data);
    removeSkeleton();
    removeToolProgress();
    appendMsg('assistant', data.payload);
    if (data.thread_id) threadID = data.thread_id;
    sendBtn.disabled = false;
  });

  eventSource.addEventListener('tool_call', (e) => {
    const data = JSON.parse(e.data);
    showToolProgress(data.meta.tool_name);
  });

  eventSource.addEventListener('tool_result', (e) => {
    hideToolProgress();
  });

  eventSource.addEventListener('gate_pending', (e) => {
    const data = JSON.parse(e.data);
    removeSkeleton();
    removeToolProgress();
    appendPendingGateMsg(data.meta);
    setInputDisabled(true);
    if (data.thread_id) threadID = data.thread_id;
    loadGates();
  });

  eventSource.addEventListener('gate_resolved', (e) => {
    const pendingMsg = document.getElementById('pending-gate-msg');
    if (pendingMsg) pendingMsg.remove();
    setInputDisabled(false);
    loadGates();
  });

  eventSource.addEventListener('error', (e) => {
    const data = e.data ? JSON.parse(e.data) : {};
    removeSkeleton();
    removeToolProgress();
    appendMsg('error', data.payload || 'SSE 错误');
    sendBtn.disabled = false;
  });

  eventSource.onerror = () => {
    sseStatusEl.textContent = 'SSE 断开';
    sseStatusEl.classList.remove('connected');
  };
}

async function loadGates() {
  const panel = document.getElementById('gatePanel');
  panel.innerHTML = '<div style="font-size:12px;color:var(--color-text-muted);padding:4px 0">加载中...</div>';
  try {
    const res = await fetch('/api/gates/pending?user_id=' + encodeURIComponent(userID));
    const data = await res.json();
    const hadPendingGate = document.getElementById('pending-gate-msg') !== null;
    const hasThreadGate = data.gates && data.gates.some(g => g.thread_id === threadID);

    if (!data.gates || data.gates.length === 0) {
      panel.innerHTML = '<div style="font-size:12px;color:var(--color-text-muted);padding:4px 0">暂无待审批项</div>';
    } else {
      panel.innerHTML = '';
      data.gates.forEach(g => {
        const div = document.createElement('div');
        div.className = 'gate-item';
        div.innerHTML = `
          <div class="tool">${g.tool_name}</div>
          <div class="description">${g.description || ''}</div>
          <div class="actions">
            <button class="approve" onclick="resolveGate('${g.request_id}', '${g.thread_id}', 'approve')">通过</button>
            <button class="deny" onclick="resolveGate('${g.request_id}', '${g.thread_id}', 'deny')">拒绝</button>
          </div>
        `;
        panel.appendChild(div);
      });
    }

    if (hadPendingGate && !hasThreadGate && threadID && !resolvingGate) {
      const pendingMsg = document.getElementById('pending-gate-msg');
      if (pendingMsg) pendingMsg.remove();
      setInputDisabled(false);
      inputEl.value = '__resume__';
      await send();
    }
  } catch (err) {
    panel.innerHTML = '<div style="font-size:12px;color:var(--color-text-muted);padding:4px 0">加载失败</div>';
  }
}

async function resolveGate(requestID, gateThreadID, action) {
  if (resolvingGate) return;
  resolvingGate = true;
  try {
    const res = await fetch('/api/gates/' + action, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request_id: requestID, thread_id: gateThreadID, user_id: userID })
    });
    if (!res.ok) throw new Error((await res.json()).error || '操作失败');

    if (action === 'approve' && gateThreadID === threadID) {
      const pendingMsg = document.getElementById('pending-gate-msg');
      if (pendingMsg) pendingMsg.remove();
      setInputDisabled(false);
      inputEl.value = '__resume__';
      await send();
    }

    await loadGates();
  } catch (err) {
    alert('操作失败: ' + err.message);
  } finally {
    resolvingGate = false;
  }
}

async function loadThreads() {
  const panel = document.getElementById('threadPanel');
  panel.classList.toggle('active');
  if (!panel.classList.contains('active')) return;
  try {
    const res = await fetch('/api/history/threads');
    const data = await res.json();
    if (!data.threads || data.threads.length === 0) {
      panel.innerHTML = '<div style="color:var(--color-text-muted);padding:4px 0">暂无历史</div>';
      return;
    }
    panel.innerHTML = '';
    data.threads.forEach(t => {
      const div = document.createElement('div');
      div.className = 'thread-item';
      if (t.id === threadID) {
        div.classList.add('active');
        activeThreadEl = div;
      }
      div.textContent = (t.title || t.id).slice(0, 28);
      div.onclick = () => {
        if (activeThreadEl) activeThreadEl.classList.remove('active');
        div.classList.add('active');
        activeThreadEl = div;
        loadThread(t.id);
      };
      panel.appendChild(div);
    });
  } catch (err) {
    panel.innerHTML = '<div style="color:var(--color-text-muted);padding:4px 0">加载失败</div>';
  }
}

async function loadThread(id) {
  try {
    const res = await fetch('/api/history/threads/' + id);
    const data = await res.json();
    msgsEl.innerHTML = '';
    threadID = id;
    if (data.messages) {
      data.messages.forEach(m => {
        appendMsg(m.role === 'user' ? 'user' : 'assistant', m.content || '');
      });
    }
    connectSSE();
  } catch (err) {
    appendMsg('error', '加载失败: ' + err.message);
  }
}

inputEl.addEventListener('input', () => {
  inputEl.rows = 1;
  const lines = inputEl.value.split('\n').length;
  inputEl.rows = Math.min(lines, 6);
});

// 初始化 SSE 和轮询
connectSSE();
setInterval(loadGates, 15000);
loadGates();

// 连接状态检测
setInterval(async () => {
  try {
    const res = await fetch('/health', { method: 'HEAD' });
    statusEl.textContent = '在线';
    statusEl.classList.remove('offline');
  } catch {
    statusEl.textContent = '离线';
    statusEl.classList.add('offline');
  }
}, 30000);
</script>
