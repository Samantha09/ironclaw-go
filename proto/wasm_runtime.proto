syntax = "proto3";

package ironclaw.wasm;

option go_package = "github.com/nearai/ironclaw-go/proto/gen;wasmproto";

// WasmRuntime is the sidecar interface between the Go orchestrator
// and the Rust wasmtime runtime.
service WasmRuntime {
  // Execute a WASM tool with the given parameters.
  rpc ExecuteTool(ToolRequest) returns (ToolResponse);

  // Load a WASM channel adapter.
  rpc LoadChannel(ChannelConfig) returns (ChannelHandle);

  // Send an event to a loaded WASM channel.
  rpc SendChannelEvent(ChannelEvent) returns (Empty);

  // Health check.
  rpc Health(Empty) returns (HealthStatus);
}

message ToolRequest {
  string tool_name = 1;
  bytes wasm_module = 2;
  string params_json = 3;
  string user_id = 4;
  // Injected secrets scoped to this invocation.
  map<string, string> secrets = 5;
  // Fuel limit (approximate instruction count).
  uint64 fuel_limit = 6;
  // Max memory in bytes.
  uint64 max_memory = 7;
}

message ToolResponse {
  bool success = 1;
  string output_json = 2;
  string error_message = 3;
  uint64 fuel_consumed = 4;
}

message ChannelConfig {
  string channel_name = 1;
  bytes wasm_module = 2;
  string config_json = 3;
}

message ChannelHandle {
  string handle_id = 1;
  bool success = 2;
  string error_message = 3;
}

message ChannelEvent {
  string handle_id = 1;
  string event_json = 2;
}

message Empty {}

message HealthStatus {
  bool healthy = 1;
  string version = 2;
}
