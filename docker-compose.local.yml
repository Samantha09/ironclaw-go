# 本地预编译二进制部署（绕过 Docker 内构建的 Go 版本限制）
services:
  ironclaw:
    image: ubuntu:24.04
    command: ["/app/ironclaw"]
    working_dir: /app
    volumes:
      - ./bin/ironclaw:/app/ironclaw:ro
      - ./data:/app/data
    ports:
      - "8080:8080"
    environment:
      - IRONCLAW_ENV=development
      - IRONCLAW_DATABASE_DRIVER=memory
      - IRONCLAW_AGENT_NAME=IronClawDev
      - IRONCLAW_CHANNELS_HTTP=true
      - IRONCLAW_CHANNELS_HTTP_PORT=8080
      - IRONCLAW_SIDECAR_ADDR=sidecar:50051
    depends_on:
      - sidecar

  sidecar:
    image: ubuntu:24.04
    command: ["/app/wasm-runtime"]
    working_dir: /app
    volumes:
      - ./wasm-runtime/target/release/ironclaw-wasm-runtime:/app/wasm-runtime:ro
      - ./extensions:/app/extensions:ro
    environment:
      - RUST_LOG=info
      - WASM_RUNTIME_ADDR=0.0.0.0:50051
